<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>R1 News Fetcher</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <nav class="chrome-nav">
    <button id="navBack" class="nav-btn" title="Back" aria-label="Back">←</button>
    <button id="navHome" class="nav-btn" title="Home" aria-label="Home">⌂</button>
    <span id="viewLabel" class="view-label">Home</span>
    <div id="fontTools" class="font-tools hidden" aria-label="Font size controls">
      <button id="fontDown" class="nav-btn nav-btn-font" title="Smaller text" aria-label="Smaller text">A−</button>
      <button id="fontUp" class="nav-btn nav-btn-font" title="Larger text" aria-label="Larger text">A+</button>
    </div>
  </nav>

  <main class="app-shell">
    <section id="viewHome" class="view">
      <header class="hero">
        <h1>R1 News Fetcher</h1>
        <p>Fast cards. Clean reading. Built for Rabbit r1.</p>
      </header>

      <section class="card controls">
        <label for="urlInput">News source URL</label>
        <div class="row">
          <input id="urlInput" type="url" placeholder="bbc.com or reuters.com" />
          <button id="previewBtn" class="btn">Preview</button>
          <button id="fetchFromUrlBtn" class="btn btn-primary">Fetch</button>
        </div>

        <label for="searchInput">Search news</label>
        <div class="row">
          <input id="searchInput" type="text" placeholder="honda, iraq, AI..." />
          <button id="searchBtn" class="btn btn-primary">Search</button>
        </div>

        <div class="row top-gap">
          <button id="breakingBtn" class="btn btn-soft">🌍 Breaking News</button>
        </div>
      </section>

      <section id="previewPane" class="card hidden" aria-live="polite">
        <h3>URL Preview</h3>
        <div><strong>Domain:</strong> <span id="previewDomain">-</span></div>
        <div class="full-url"><strong>URL:</strong> <span id="previewUrl">-</span></div>
        <div><strong>Safety:</strong> <span id="previewSafety" class="badge">Unknown</span></div>
        <div class="row top-gap">
          <button id="openPreviewBtn" class="btn btn-primary">Fetch from this source</button>
          <button id="cancelPreviewBtn" class="btn">Cancel</button>
        </div>
      </section>

      <section class="card">
        <h3>Recent Searches</h3>
        <div id="recentSearches" class="recent-list"></div>
      </section>

      <section class="card">
        <h3>Recently Opened</h3>
        <div id="recentArticles" class="recent-list"></div>
      </section>
    </section>

    <section id="viewCards" class="view hidden">
      <header class="subhead card">
        <div class="row subhead-row">
          <h2 id="cardsTitle">News Cards</h2>
          <div class="row compact-controls">
            <button id="prevCardBtn" class="btn">◀</button>
            <button id="nextCardBtn" class="btn">▶</button>
          </div>
        </div>

      </header>
      <section id="deck" class="deck" aria-label="News cards stack"></section>
    </section>

    <section id="viewArticle" class="view hidden">
      <article class="article-shell card">
        <h2 id="articleTitle">Article</h2>
        <div id="articleSections" class="article-sections"></div>
        <a id="articleSource" class="source-link source-link-bottom" href="#" target="_blank" rel="noopener noreferrer">Open original source ↗</a>
      </article>
    </section>
  </main>

  <section id="status" class="status" aria-live="polite"></section>

  <script src="./main.js?v=18"></script>
</body>
</html>
