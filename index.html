<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=240, initial-scale=1.0, user-scalable=no" />
  <title>R1 News Fetcher</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <nav class="chrome-nav">
    <button id="navBack" class="nav-btn" title="Back" aria-label="Back">←</button>
    <button id="navHome" class="nav-btn" title="Home" aria-label="Home">⌂</button>
    <span id="viewLabel" class="view-label">Home</span>
    <div id="fontTools" class="font-tools hidden" aria-label="Font size controls">
      <button id="fontDown" class="nav-btn nav-btn-font" title="Smaller text" aria-label="Smaller text">A−</button>
      <button id="fontUp" class="nav-btn nav-btn-font" title="Larger text" aria-label="Larger text">A+</button>
    </div>
  </nav>

  <main class="app-shell">
    <section id="viewHome" class="view">
      <header class="hero">
        <h1>R1 News</h1>
      </header>

      <section class="card controls">
        <div class="row">
          <input id="searchInput" type="text" placeholder="Search news…" />
          <button id="searchBtn" class="btn btn-primary">Go</button>
        </div>
      </section>

      <section class="card">
        <h3>🌍 By Region</h3>
        <div id="regionList" class="region-grid"></div>
      </section>

      <section class="card">
        <h3>⚡ Breaking News</h3>
        <div id="breakingDeck" class="deck" aria-label="Breaking news cards"></div>
        <div id="breakingLoading" class="microcopy" style="text-align:center;padding:.3rem 0">Loading…</div>
      </section>

      <section class="card">
        <h3>🔎 Recent Searches</h3>
        <div id="recentSearches" class="recent-list"></div>
      </section>

      <section class="card">
        <h3>📰 Recently Opened</h3>
        <div id="recentArticles" class="recent-list"></div>
      </section>
    </section>

    <section id="viewCards" class="view hidden">
      <section id="deck" class="deck" aria-label="News cards stack"></section>
    </section>

    <section id="viewArticle" class="view hidden">
      <article class="article-shell card">
        <h2 id="articleTitle">Article</h2>
        <div id="articleSections" class="article-sections"></div>
        <a id="articleSource" class="source-link source-link-bottom" href="#" target="_blank"
          rel="noopener noreferrer">Open original source ↗</a>
      </article>
    </section>
  </main>

  <section id="status" class="status" aria-live="polite"></section>

  <script src="./main.js?v=21"></script>
</body>

</html>
